text: "Nápady, nadšení, aktivita – to jsou věci, které nechybí týmu kolem Kamily, Pavlíny, Nikol a ostatních z jejich party. Spolupracovala jsem s nimi na dvou ročnících Mediální olympiády pro středoškoláky a v obou případech to byla velká radost a velká inspirace. Ocenit musím především vysokou erudici, zápal pro práci a vytrvalost, stejně jako jejich organizační superschopnosti. A pozor - jejich nadšení je nakažlivé!"
name: "Martina Vašíčková"
position: "Akademie ČTK"
