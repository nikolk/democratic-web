text: "Tým lidí kolem Mediální olympiády je sehranou skupinou nadšenců, kteří se nebojí ani sebevětších výzev. Co je ale důležité, že rozumí tématu mediálního vzdělávání a mají blízký vztah ke studentům, což bylo v průběhu dvou ročníků, kterých jsem se za Wikimedia ČR účastnil více než zjevné."
name: "Pavel Bednařík"
