text: "Spolupráce s týmem DemocraTIC je pro mě velkým přínosem v osobní i profesní oblasti. Oceňuji jejich profesionální přístup, inovativní myšlení a otevřenost k novým nápadům. Tým je velmi angažovaný a vždy připravený řešit výzvy s maximálním nasazením v rozličných oblastech podporující rozvoj digitální, informační a mediální gramotnosti různých cílových skupin."
name: "Tomáš Javorčík"
