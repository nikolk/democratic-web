text: "S týmem spolku DemocraTIC spolupracuji na několika projektech, které se věnují občanskému vzdělávání a zejména práci s mládeží. Máme za sebou několik kurzů a velkých akcí s významným dopadem v oblasti mediální výchovy. Spolupráce s mladými, nadanými a energickými členy týmu se zájmem o kultivaci demokracie a šíření demokratických hodnot je vždy záruka úspěchu. Navíc se jedná o aktivity v oblastech, které jsou pro rozvoj občanské společnosti a demokracie tolik potřebné a důležité."
