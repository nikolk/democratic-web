text: "S týmem DemocraTIC jsem se seznámila při práci na Mediální olympiádě, kterou pořádali, a byla jsem nadšená jejich profesionalitou a zápalem. Tým tvoří lidé s vynikající odborností, otevřeným přístupem a neskutečným elánem. Každá naše spolupráce byla inspirativní a plná pozitivní energie a já se moc těším na další společné projekty!"
name: "Klára Tejchman"
